<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LCS Rutina">
  <meta name="theme-color" content="#0a0a0f">
  <title>LCS Rutina</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--accent:#4fffb0;--accent3:#ffd166;--text:#e8e8f0;--text-dim:#6b6b88;--text-muted:#3a3a52;--phase1:#4fffb0;--phase2:#4fc3ff;--phase3:#ff9f4a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
    .topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .topbar-progress{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.05em}
    .reset-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer}
    .reset-btn:active{background:var(--surface2)}
    .progress-bar-wrap{height:3px;background:var(--surface2)}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--phase3));transition:width .5s cubic-bezier(.34,1.56,.64,1)}
    main{padding:0 0 100px}
    .phase-header{padding:24px 20px 12px;display:flex;align-items:baseline;gap:12px}
    .phase-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px;border-radius:4px;font-weight:500}
    .phase-name{font-size:18px;font-weight:800;letter-spacing:-.01em}
    .phase-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto}
    .phase-1 .phase-tag{background:rgba(79,255,176,.12);color:var(--phase1)}
    .phase-2 .phase-tag{background:rgba(79,195,255,.12);color:var(--phase2)}
    .phase-3 .phase-tag{background:rgba(255,159,74,.12);color:var(--phase3)}
    .exercise-card{margin:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s}
    .exercise-card.all-done{border-color:transparent;background:var(--surface2)}
    .exercise-card.all-done .exercise-name{color:var(--text-dim)}
    .exercise-header{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:14px}
    .exercise-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .exercise-info{flex:1;min-width:0}
    .exercise-name{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.2;margin-bottom:4px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--text-muted);text-underline-offset:3px}
    .exercise-name:active{opacity:.7}
    .exercise-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.04em}
    .exercise-focus{font-size:11px;color:var(--text-muted);margin-top:3px;font-style:italic}
    .done-badge{display:none;font-size:18px;flex-shrink:0;align-self:center}
    .all-done .done-badge{display:block}
    .all-done .series-grid{display:none}
    .series-grid{padding:0 18px 16px;display:flex;gap:8px;flex-wrap:wrap}
    .serie-btn{flex:1;min-width:60px;max-width:90px;height:48px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .serie-btn:active{transform:scale(.95)}
    .serie-btn.checked{background:rgba(79,255,176,.08);border-color:var(--accent);color:var(--accent)}
    .serie-btn.checked::after{content:"✓";font-size:14px}
    .serie-btn:not(.checked)::after{content:attr(data-label)}
    .phase-2 .serie-btn.checked{background:rgba(79,195,255,.08);border-color:var(--phase2);color:var(--phase2)}
    .phase-3 .serie-btn.checked{background:rgba(255,159,74,.08);border-color:var(--phase3);color:var(--phase3)}
    .phase-divider{height:1px;background:var(--border);margin:20px 16px 0;opacity:.5}
    .img-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
    .img-modal-overlay.visible{display:flex}
    .img-modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:20px 20px 40px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .img-modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .img-modal-title{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
    .img-modal-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:14px;letter-spacing:.04em}
    .img-modal-img{width:100%;height:220px;object-fit:cover;border-radius:14px;background:var(--surface2);display:block}
    .img-modal-focus{margin-top:12px;font-size:13px;color:var(--text-dim);line-height:1.5}
    .img-modal-close{margin-top:16px;width:100%;height:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
    .img-modal-close:active{background:var(--border)}
    .completion-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
    .completion-screen.visible{display:flex}
    .completion-emoji{font-size:72px;margin-bottom:24px;animation:bounce .6s ease}
    .completion-title{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
    .completion-sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-dim);line-height:1.6}
    .completion-btn{margin-top:40px;background:var(--accent);color:var(--bg);border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:16px 32px;border-radius:12px;cursor:pointer}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    .timer-strip{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,20,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 20px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .timer-display{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--accent);letter-spacing:.04em;min-width:90px}
    .timer-display.resting{color:var(--accent3)}
    .timer-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
    .timer-controls{display:flex;gap:8px}
    .timer-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .timer-btn.primary{background:var(--accent);border-color:var(--accent);color:var(--bg)}
    .timer-btn:active{transform:scale(.93)}
    .rest-btn{flex:1;height:44px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,209,102,.06);color:var(--accent3);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;text-transform:uppercase}
    .rest-btn:active{background:rgba(255,209,102,.12)}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">LCS Rutina</div>
  <div class="topbar-progress" id="topProgress">0 / 0</div>
  <button class="reset-btn" onclick="resetAll()">reset</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
<main id="mainContent"></main>

<div class="img-modal-overlay" id="imgModal" onclick="closeImgModal(event)">
  <div class="img-modal">
    <div class="img-modal-handle"></div>
    <div class="img-modal-title" id="modalTitle"></div>
    <div class="img-modal-meta" id="modalMeta"></div>
    <img class="img-modal-img" id="modalImg" src="" alt="">
    <div class="img-modal-focus" id="modalFocus"></div>
    <button class="img-modal-close" onclick="closeImgModalBtn()">Cerrar</button>
  </div>
</div>

<div class="completion-screen" id="completionScreen">
  <div class="completion-emoji">🔥</div>
  <div class="completion-title">Sesión<br>completada</div>
  <div class="completion-sub">Todas las series están hechas.</div>
  <button class="completion-btn" onclick="resetAll()">Nueva sesión</button>
</div>

<div class="timer-strip">
  <div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">stopwatch</div>
  </div>
  <button class="rest-btn" onclick="startRest()">descanso 60s</button>
  <div class="timer-controls">
    <button class="timer-btn" onclick="resetTimer()">↺</button>
    <button class="timer-btn primary" id="startStopBtn" onclick="toggleTimer()">▶</button>
  </div>
</div>

    {name:"Clamshells con banda",meta:"3 × 15 por lado",focus:"Glúteo medio — la cadera no rota. Solo abre la rodilla de arriba.",icon:"🦀",series:3,imgKey:"clamshell"},
    {name:"Dead bug",meta:"3 × 8 por lado",focus:"Espalda baja PEGADA al piso en todo momento. Si se despega, es demasiado rango.",icon:"🐛",series:3,imgKey:"dead_bug"},
    {name:"Bird dog",meta:"3 × 8 por lado",focus:"Extiende lento, pausa 2 seg arriba. Sin rotación de pelvis.",icon:"🐦",series:3,imgKey:"bird_dog"},
    {name:"Hollow body hold",meta:"3 × 20–30 seg",focus:"Zona lumbar aplastada contra el piso. Brazos extendidos arriba.",icon:"🫙",series:3,imgKey:"hollow_body"},
  ]},
  {id:3,tag:"Fase 3",name:"Integración Funcional",time:"10–12 min",class:"phase-3",icon:"🏋️",exercises:[
    {name:"Hip thrust con peso",meta:"3 × 12",focus:"Espalda apoyada en borde del banco a altura escapular. Barra sobre cadera con pad.",icon:"🎯",series:3,imgKey:"hip_thrust"},
    {name:"Romanian deadlift (RDL)",meta:"3 × 10",focus:"Espalda recta, empuja caderas hacia atrás. Estiramiento en isquiotibiales.",icon:"🏗️",series:3,imgKey:"rdl"},
    {name:"Split squat búlgaro",meta:"3 × 8 por lado",focus:"Pie trasero en banco — trabajo en pierna delantera. Rodilla no colapsa.",icon:"⚖️",series:3,imgKey:"split_squat"},
    {name:"Plank lateral",meta:"2 × 30 seg por lado",focus:"Cuerpo en línea recta, cadera no cae. Codo directamente bajo el hombro.",icon:"📐",series:2,imgKey:"side_plank"},
  ]}
];

let state={},totalSeries=0,completedSeries=0;
function initState(){state={};totalSeries=0;completedSeries=0;PHASES.forEach(p=>p.exercises.forEach((ex,ei)=>{const k=p.id+"-"+ei;state[k]=new Array(ex.series).fill(false);totalSeries+=ex.series}))}

function buildUI(){
  const main=document.getElementById("mainContent");main.innerHTML="";
  PHASES.forEach((phase,pi)=>{
    if(pi>0){const d=document.createElement("div");d.className="phase-divider";main.appendChild(d)}
    const pd=document.createElement("div");pd.className=phase.class;
    pd.innerHTML=`<div class="phase-header"><span class="phase-tag">${phase.tag}</span><span class="phase-name">${phase.name}</span><span class="phase-time">${phase.time}</span></div>`;
    phase.exercises.forEach((ex,ei)=>{
      const k=phase.id+"-"+ei,card=document.createElement("div");
      card.className="exercise-card";card.id="card-"+k;
      if(state[k].every(Boolean))card.classList.add("all-done");
      let sh="";
      for(let s=0;s<ex.series;s++)sh+=`<button class="serie-btn ${state[k][s]?"checked":""}" data-label="S${s+1}" onclick="toggleSerie('${k}',${s},this)"></button>`;
      card.innerHTML=`<div class="exercise-header"><div class="exercise-icon" style="background:var(--surface2)">${ex.icon}</div><div class="exercise-info"><div class="exercise-name" onclick="openModal('${phase.id}','${ei}')">${ex.name}</div><div class="exercise-meta">${ex.meta}</div><div class="exercise-focus">${ex.focus}</div></div><div class="done-badge">✅</div></div><div class="series-grid">${sh}</div>`;
      pd.appendChild(card);
    });
    main.appendChild(pd);
  });
  updateProgress();
}

function toggleSerie(k,idx,btn){
  state[k][idx]=!state[k][idx];
  if(state[k][idx]){btn.classList.add("checked");completedSeries++;btn.style.transform="scale(1.08)";setTimeout(()=>btn.style.transform="",150)}
  else{btn.classList.remove("checked");completedSeries--}
  const card=document.getElementById("card-"+k);
  state[k].every(Boolean)?card.classList.add("all-done"):card.classList.remove("all-done");
  saveState();updateProgress();
  if(completedSeries===totalSeries)setTimeout(()=>document.getElementById("completionScreen").classList.add("visible"),600);
}

function updateProgress(){
  document.getElementById("topProgress").textContent=completedSeries+" / "+totalSeries;
  document.getElementById("progressFill").style.width=(totalSeries>0?completedSeries/totalSeries*100:0)+"%";
}

function openModal(phaseId,exIdx){
  const phase=PHASES.find(p=>p.id==phaseId),ex=phase.exercises[parseInt(exIdx)];
  document.getElementById("modalTitle").textContent=ex.name;
  document.getElementById("modalMeta").textContent=ex.meta;
  document.getElementById("modalFocus").textContent=ex.focus;
  document.getElementById("modalImg").src=IMGS[ex.imgKey]||"";
  document.getElementById("imgModal").classList.add("visible");
  document.body.style.overflow="hidden";
}
function closeImgModal(e){if(e.target===document.getElementById("imgModal"))closeImgModalBtn()}
function closeImgModalBtn(){document.getElementById("imgModal").classList.remove("visible");document.body.style.overflow=""}

function resetAll(){
  clearInterval(timerInterval);timerRunning=false;timerSeconds=0;isRest=false;updateTimerDisplay();
  document.getElementById("startStopBtn").textContent="▶";
  document.getElementById("timerDisplay").classList.remove("resting");
  document.getElementById("timerLabel").textContent="stopwatch";
  document.getElementById("completionScreen").classList.remove("visible");
  localStorage.removeItem("lcsState");initState();buildUI();
}
function saveState(){localStorage.setItem("lcsState",JSON.stringify({state,completedSeries}))}
function loadState(){try{const s=localStorage.getItem("lcsState");if(s){const p=JSON.parse(s);state=p.state;completedSeries=p.completedSeries;return true}}catch(e){}return false}

let timerSeconds=0,timerInterval=null,timerRunning=false,isRest=false;
function pad(n){return String(n).padStart(2,"0")}
function updateTimerDisplay(){const m=Math.floor(timerSeconds/60),s=timerSeconds%60;document.getElementById("timerDisplay").textContent=pad(m)+":"+pad(s)}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById("startStopBtn").textContent="▶"}
  else{timerRunning=true;document.getElementById("startStopBtn").textContent="⏸";timerInterval=setInterval(()=>{isRest?timerSeconds--:timerSeconds++;if(isRest&&timerSeconds<=0){timerSeconds=0;clearInterval(timerInterval);timerRunning=false;isRest=false;document.getElementById("startStopBtn").textContent="▶";document.getElementById("timerDisplay").classList.remove("resting");document.getElementById("timerLabel").textContent="stopwatch";if("vibrate"in navigator)navigator.vibrate([200,100,200])}updateTimerDisplay()},1000)}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;isRest=false;timerSeconds=0;document.getElementById("startStopBtn").textContent="▶";document.getElementById("timerDisplay").classList.remove("resting");document.getElementById("timerLabel").textContent="stopwatch";updateTimerDisplay()}
function startRest(){clearInterval(timerInterval);timerSeconds=60;isRest=true;timerRunning=true;document.getElementById("timerDisplay").classList.add("resting");document.getElementById("timerLabel").textContent="descanso";document.getElementById("startStopBtn").textContent="⏸";updateTimerDisplay();timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){timerSeconds=0;clearInterval(timerInterval);timerRunning=false;isRest=false;document.getElementById("timerDisplay").classList.remove("resting");document.getElementById("timerLabel").textContent="stopwatch";document.getElementById("startStopBtn").textContent="▶";if("vibrate"in navigator)navigator.vibrate([200,100,200])}},1000)}

initState();
if(!loadState())initState();
buildUI();
</script>
</body>
</html>
